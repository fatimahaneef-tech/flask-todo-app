name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Flask tests
        run: |
          python -c "
          from app import app
          client = app.test_client()
          response = client.get('/')
          assert response.status_code == 200
          print(' Flask app responds with HTTP 200')
          "

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-app:${{ github.sha }} .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-app:latest

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # Pull latest image
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/todo-app:latest
            
            # Stop and remove old container
            sudo docker stop todo-app || true
            sudo docker rm todo-app || true
            
            # Run new container
            sudo docker run -d \
              --name todo-app \
              -p 80:5000 \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/todo-app:latest
            
            # Cleanup old images
            sudo docker system prune -f
            
            echo " Deployed to http://${{ secrets.AWS_HOST }}"